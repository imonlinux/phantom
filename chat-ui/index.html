<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Phantom</title>
    <link rel="icon" href="/chat/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/chat/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/chat/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!--
      apple-mobile-web-app-title is intentionally omitted so iOS falls
      back to the manifest's `name`, which the server generates from
      the configured agent identity. Setting a static value here would
      bake "Phantom" into the iOS home-screen icon at Add-to-Home-Screen
      time and JS cannot update it after iOS caches it. Existing iOS
      installs keep the old label until reinstalled.
    -->
    <meta name="theme-color" content="#4850c4" />
    <link
      rel="preload"
      href="/chat/fonts/inter-var-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/chat/fonts/jetbrains-mono-var-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
